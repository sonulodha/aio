---
{{- /* These secrets are assigned to each pod, and are required to exist for the pod to start. */}}
{{- /* Default behaviour: use AWS Secrets Manager via CSI. */}}
{{- if or (not .Values.secrets) (not .Values.secrets.infisical.enabled) }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  # Kustomize sets the namespace, and that's what differentiates the secrets between environments.
  name: {{ $.Release.Name }}-appsettings
spec:
  provider: aws
  parameters:
    region: us-east-1
    objects: |
      - objectName: "{{ .Release.Name }}/{{ .Values.env }}/appsettings.json"
        objectAlias: "appsettings.json"
        objectType: "secretsmanager"
  # Sync secrets to Kubernetes Secret
  secretObjects:
    - secretName: {{ $.Release.Name }}-appsettings
      type: Opaque
      data:
        - objectName: appsettings.json
          key: file-content
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ $.Release.Name }}-env
spec:
  provider: aws
  parameters:
    region: us-east-1
    objects: |
      - objectName: "{{ .Release.Name }}/{{ .Values.env }}/env.json"
        objectAlias: "env.json"
        objectType: "secretsmanager"
  # Sync secrets to Kubernetes Secret
  secretObjects:
    - secretName: {{ $.Release.Name }}-env
      type: Opaque
      data:
        - objectName: env.json
          key: file-content
{{- end }}

{{- /* Optional: use Infisical instead of AWS CSI when enabled. */}}
{{- if .Values.secrets.infisical.enabled }}
---
apiVersion: infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: {{ printf "%s-appsettings" $.Release.Name }}
spec:
  authentication:
    kubernetesAuth:
      identityId: {{ required "secrets.infisical.identityId is required when using Infisical" .Values.secrets.infisical.identityId }}
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: {{ required "secrets.infisical.serviceAccountName is required when using Infisical" .Values.secrets.infisical.serviceAccountName }}
        namespace: {{ required "secrets.infisical.serviceAccountNamespace is required when using Infisical" .Values.secrets.infisical.serviceAccountNamespace }}
      secretsScope:
        projectSlug: {{ .Values.secrets.infisical.projectSlug }}
        envSlug: {{ default .Values.env .Values.secrets.infisical.envSlug }}
        secretsPath: {{ default "/" .Values.secrets.infisical.appsettings.secretsPath }}
        secretName: {{ printf "%s-appsettings" $.Release.Name }}
        recursive: {{ default false .Values.secrets.infisical.appsettings.recursive }}
  managedSecretReference:
    secretName: {{ printf "%s-appsettings" $.Release.Name }}
    secretNamespace: {{ include "eCapService.namespace" . }}
    creationPolicy: {{ default "Owner" .Values.secrets.infisical.appsettings.creationPolicy }}
---
apiVersion: infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: {{ printf "%s-env" $.Release.Name }}
spec:
  authentication:
    kubernetesAuth:
      identityId: {{ required "secrets.infisical.identityId is required when using Infisical" .Values.secrets.infisical.identityId }}
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: {{ required "secrets.infisical.serviceAccountName is required when using Infisical" .Values.secrets.infisical.serviceAccountName }}
        namespace: {{ required "secrets.infisical.serviceAccountNamespace is required when using Infisical" .Values.secrets.infisical.serviceAccountNamespace }}
      secretsScope:
        projectSlug: {{ .Values.secrets.infisical.projectSlug }}
        envSlug: {{ default .Values.env .Values.secrets.infisical.envSlug }}
        secretsPath: {{ default "/" .Values.secrets.infisical.env.secretsPath }}
        secretName: {{ printf "%s-env" $.Release.Name }}
        recursive: {{ default false .Values.secrets.infisical.env.recursive }}
  managedSecretReference:
    secretName: {{ printf "%s-env" $.Release.Name }}
    secretNamespace: {{ include "eCapService.namespace" . }}
    creationPolicy: {{ default "Owner" .Values.secrets.infisical.env.creationPolicy }}
{{- end }}
